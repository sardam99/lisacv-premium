<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LisaCV Premium</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
padding-bottom:120px;
transition:.4s;
}

/* LIGHT MODE */

body.light{
background:#fffbea;
color:black;
}

/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:-1;
}

.blur{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.4;
}

.blur1{
width:350px;
height:350px;
background:#facc15;
top:-120px;
left:-120px;
}

.blur2{
width:300px;
height:300px;
background:#eab308;
bottom:-100px;
right:-100px;
}

.blur3{
width:250px;
height:250px;
background:#fde047;
top:40%;
left:40%;
}

/* HERO */

.hero{
padding:45px 20px;
text-align:center;
}

.logo{
width:120px;
height:120px;
border-radius:35px;
background:linear-gradient(135deg,#facc15,#eab308);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:25px;
font-size:50px;
color:black;
box-shadow:0 0 40px rgba(250,204,21,.4);
}

.hero h1{
font-size:55px;
color:#facc15;
}

/* MAIN */

.main{
padding:20px;
}

/* GLASS */

.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(250,204,21,.15);
border-radius:35px;
padding:25px;
margin-bottom:25px;
}

/* SECTION */

.section{
display:none;
}

.active{
display:block;
animation:fade .4s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* TITLE */

.title{
font-size:28px;
margin-bottom:25px;
color:#facc15;
}

/* BUILDER */

.builder{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

@media(min-width:1000px){

.builder{
grid-template-columns:1fr 1fr;
}

}

/* INPUT */

input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:18px;
margin-bottom:15px;
background:rgba(255,255,255,.08);
border:1px solid rgba(250,204,21,.1);
color:white;
font-size:15px;
}

body.light input{
background:#fff7cc;
color:black;
}

input::placeholder{
color:#d1d5db;
}

/* BUTTON */

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
cursor:pointer;
margin-bottom:12px;
font-size:15px;
font-weight:600;
background:linear-gradient(135deg,#facc15,#eab308);
color:black;
transition:.3s;
}

.btn:hover{
transform:scale(1.02);
}

/* COLORS */

.colors{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.color{
width:45px;
height:45px;
border-radius:50%;
cursor:pointer;
border:3px solid white;
}

.blue{
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.green{
background:linear-gradient(135deg,#10b981,#34d399);
}

.red{
background:linear-gradient(135deg,#ef4444,#fb7185);
}

.purple{
background:linear-gradient(135deg,#8b5cf6,#c084fc);
}

.darkc{
background:linear-gradient(135deg,#111827,#374151);
}

.whitec{
background:linear-gradient(135deg,#ffffff,#d1d5db);
}

/* CV */

.cv{
background:linear-gradient(135deg,#ffffff,#fef9c3,#fde68a);
border-radius:30px;
padding:35px;
color:black;
min-height:550px;
transition:.4s;
}

.cv img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:25px;
border:6px solid white;
}

.cv h2{
text-align:center;
font-size:34px;
margin-bottom:20px;
}

.cv p{
background:white;
padding:14px;
border-radius:14px;
margin-bottom:12px;
color:#111827;
font-weight:500;
}

/* SAVED */

.saved{
padding:20px;
border-radius:25px;
margin-bottom:15px;
background:rgba(255,255,255,.06);
border:1px solid rgba(250,204,21,.15);
}

.saved h2{
color:#facc15;
margin-bottom:10px;
}

/* NAV */

.nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:700px;
background:rgba(10,10,10,.9);
backdrop-filter:blur(20px);
border-radius:35px;
display:flex;
justify-content:space-around;
padding:18px;
z-index:999;
border:1px solid rgba(250,204,21,.15);
}

body.light .nav{
background:white;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
font-size:12px;
}

.active-nav{
color:#facc15 !important;
}

</style>

</head>

<body>

<div class="bg">

<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

</div>

<section class="hero">

<div class="logo">
<i class="fa-solid fa-file"></i>
</div>

<h1>LisaCV</h1>

</section>

<div class="main">

<!-- LOGIN -->

<section id="loginSection"
class="section active">

<div class="glass">

<h2 class="title">
Login / Register
</h2>

<input type="email"
id="loginEmail"
placeholder="Email">

<input type="password"
id="loginPassword"
placeholder="Password">

<button class="btn"
onclick="registerUser()">

Register

</button>

<button class="btn"
onclick="loginUser()">

Login

</button>

</div>

</section>

<!-- BUILDER -->

<section id="builder"
class="section">

<div class="glass">

<h2 class="title"
id="builderTitle">
دروستکردنی CV
</h2>

<div class="builder">

<div>

<div class="colors">

<div class="color blue"
onclick="changeCV('blue')"></div>

<div class="color green"
onclick="changeCV('green')"></div>

<div class="color red"
onclick="changeCV('red')"></div>

<div class="color purple"
onclick="changeCV('purple')"></div>

<div class="color darkc"
onclick="changeCV('dark')"></div>

<div class="color whitec"
onclick="changeCV('white')"></div>

</div>

<input type="file"
id="imageInput">

<input type="text"
id="fullname"
placeholder="ناوی تەواو">

<input type="text"
id="gender"
placeholder="ڕەگەز">

<input type="text"
id="education"
placeholder="ئاستی خوێندەواری">

<input type="text"
id="nationality"
placeholder="نەتەوە">

<input type="text"
id="languages"
placeholder="زمانەکان">

<input type="text"
id="age"
placeholder="تەمەن">

<input type="text"
id="skills"
placeholder="شارەزایی">

<input type="text"
id="address"
placeholder="ناونیشان">

<input type="text"
id="phone"
placeholder="ژمارەی مۆبایل">

<input type="email"
id="email"
placeholder="ئیمەیڵ">

<button class="btn"
onclick="createCV()"
id="createBtn">

دروستکردنی CV

</button>

<button class="btn"
onclick="downloadPDF()">

Download PDF

</button>

<button class="btn"
onclick="saveImage()">

Save Image

</button>

</div>

<div>

<div class="cv"
id="cvBox">

<img src="https://via.placeholder.com/130"
id="profileImage">

<h2 id="cvName">
ناوی تۆ
</h2>

<p><strong>ڕەگەز:</strong> <span id="cvGender"></span></p>

<p><strong>خوێندن:</strong> <span id="cvEducation"></span></p>

<p><strong>نەتەوە:</strong> <span id="cvNationality"></span></p>

<p><strong>زمان:</strong> <span id="cvLanguages"></span></p>

<p><strong>تەمەن:</strong> <span id="cvAge"></span></p>

<p><strong>شارەزایی:</strong> <span id="cvSkills"></span></p>

<p><strong>ناونیشان:</strong> <span id="cvAddress"></span></p>

<p><strong>مۆبایل:</strong> <span id="cvPhone"></span></p>

<p><strong>Email:</strong> <span id="cvEmail"></span></p>

</div>

</div>

</div>

</div>

</section>

<!-- HISTORY -->

<section id="history"
class="section">

<div class="glass">

<h2 class="title"
id="historyTitle">
CV ـەکانی ڕابردوو
</h2>

<div id="savedCVs"></div>

</div>

</section>

<!-- SETTINGS -->

<section id="settings"
class="section">

<div class="glass">

<h2 class="title"
id="settingsTitle">
ڕێکخستن
</h2>

<button class="btn"
onclick="toggleTheme()">

Dark / Light

</button>

<select
class="btn"
style="
background:#facc15;
color:black;
"
onchange="changeLanguage(this.value)">

<option value="ku">
کوردی
</option>

<option value="ar">
العربية
</option>

<option value="en">
English
</option>

</select>

<button class="btn"
onclick="logout()"
id="logoutBtn">

Logout

</button>

</div>

</section>

</div>

<div class="nav">

<button class="active-nav"
onclick="showSection('builder',this)">

<i class="fa-solid fa-file"></i>

<span>
CV
</span>

</button>

<button
onclick="showSection('history',this)">

<i class="fa-solid fa-clock"></i>

<span>
History
</span>

</button>

<button
onclick="showSection('settings',this)">

<i class="fa-solid fa-gear"></i>

<span>
Settings
</span>

</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCZ3qV-3bEUk9dW2xVX6P3n-mI0n4Re7Mg",

authDomain: "cv-builder-d5ea4.firebaseapp.com",

projectId: "cv-builder-d5ea4",

storageBucket: "cv-builder-d5ea4.firebasestorage.app",

messagingSenderId: "147239062596",

appId: "1:147239062596:web:d36874f8079441fbe44011",

measurementId: "G-Q1WDBJGM1R"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

/* REGISTER */

window.registerUser =
async function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Register Success");

}catch(error){

alert(error.message);

}

}

/* LOGIN */

window.loginUser =
async function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Success");

}catch(error){

alert(error.message);

}

}

/* AUTH */

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById(
"loginSection"
).classList.remove("active");

document.getElementById(
"builder"
).classList.add("active");

}else{

document.getElementById(
"loginSection"
).classList.add("active");

}

});

/* LOGOUT */

window.logout =
async function(){

await signOut(auth);

location.reload();

}

/* CREATE CV */

window.createCV =
async function(){

cvName.innerText =
fullname.value || "No Name";

cvGender.innerText =
gender.value;

cvEducation.innerText =
education.value;

cvNationality.innerText =
nationality.value;

cvLanguages.innerText =
languages.value;

cvAge.innerText =
age.value;

cvSkills.innerText =
skills.value;

cvAddress.innerText =
address.value;

cvPhone.innerText =
phone.value;

cvEmail.innerText =
email.value;

/* FIRESTORE SAVE */

await addDoc(
collection(db,"cvs"),
{

name:
fullname.value,

education:
education.value,

skills:
skills.value,

phone:
phone.value

});

loadCVs();

alert("CV Saved");

}

/* LOAD CVS */

async function loadCVs(){

savedCVs.innerHTML="";

const querySnapshot =
await getDocs(
collection(db,"cvs")
);

querySnapshot.forEach(doc=>{

const cv = doc.data();

savedCVs.innerHTML += `

<div class="saved">

<h2>
${cv.name}
</h2>

<p>
${cv.education}
</p>

<p>
${cv.skills}
</p>

<p>
${cv.phone}
</p>

</div>

`;

});

}

loadCVs();

</script>

<script>

/* IMAGE */

imageInput.addEventListener(
"change",
function(){

const file=this.files[0];

if(file){

const reader=
new FileReader();

reader.onload=function(e){

profileImage.src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

/* SECTION */

function showSection(id,btn){

document.querySelectorAll(".section")
.forEach(sec=>{

sec.classList.remove("active");

});

document.getElementById(id)
.classList.add("active");

document.querySelectorAll(".nav button")
.forEach(b=>{

b.classList.remove("active-nav");

});

btn.classList.add("active-nav");

}

/* PDF */

function downloadPDF(){

html2pdf()
.from(cvBox)
.save("LisaCV.pdf");

}

/* IMAGE SAVE */

function saveImage(){

html2canvas(cvBox)
.then(canvas=>{

let link=
document.createElement("a");

link.download=
"LisaCV.png";

link.href=
canvas.toDataURL();

link.click();

});

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle(
"light"
);

}

if(lang==="ku"){

document.documentElement.lang="ku";

"دەرچوون";

fullname.placeholder =

education.placeholder =
"ئاستی خوێندەواری";

nationality.placeholder =
"نەتەوە";

languages.placeholder =
"زمانەکان";

age.placeholder =
"تەمەن";

skills.placeholder =
"شارەزایی";

address.placeholder =
"ناونیشان";

phone.placeholder =

"ئیمەیڵ";

}

/* ARABIC */

if(lang==="ar"){

document.documentElement.lang="ar";

builderTitle.innerText =

"السير الذاتية السابقة";

"الإعدادات";

"إنشاء السيرة الذاتية";

"العمر";

skills.placeholder =

address.placeholder =
"العنوان";

"رقم الهاتف";

email.placeholder =
"البريد الإلكتروني";

/* ENGLISH */

if(lang==="en"){

document.documentElement.lang="en";

builderTitle.innerText =

"Settings";

age.placeholder =
"Age";

/* COLORS */

function changeCV(type){

if(type==="blue"){

cvBox.style.background =
"linear-gradient(135deg,#1e3a8a,#2563eb,#60a5fa)";

cvBox.style.color="white";

}

if(type==="green"){

cvBox.style.background =
"linear-gradient(135deg,#065f46,#10b981,#34d399)";

cvBox.style.color="white";

}

if(type==="red"){

cvBox.style.background =
"linear-gradient(135deg,#7f1d1d,#ef4444,#fb7185)";

cvBox.style.color="white";

}

if(type==="purple"){

cvBox.style.background =
"linear-gradient(135deg,#581c87,#8b5cf6,#c084fc)";

cvBox.style.color="white";

}

if(type==="dark"){

cvBox.style.background =
"linear-gradient(135deg,#111827,#1f2937,#374151)";

cvBox.style.color="white";

}

if(type==="white"){

cvBox.style.background =
"linear-gradient(135deg,#ffffff,#e5e7eb,#d1d5db)";

cvBox.style.color="black";

}

}

</script>

</body>

</html>
